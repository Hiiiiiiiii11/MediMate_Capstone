name: Build, Push & Deploy MediMate+

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/medimate-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/medimate-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Copy deployment files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.prod.yml,Caddyfile"
          target: "~/medimate"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            mkdir -p ~/medimate
            cd ~/medimate

            cat > .env <<EOF
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_ISSUER=${{ secrets.JWT_ISSUER }}
            JWT_AUDIENCE=${{ secrets.JWT_AUDIENCE }}
            DOMAIN_NAME=${{ secrets.DOMAIN_NAME }}
            CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}
            CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}
            CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}
            SEED_ADMIN_MAIL=${{ secrets.SEED_ADMIN_MAIL }}
            SEED_ADMIN_PASSWORD=${{ secrets.SEED_ADMIN_PASSWORD }}
            SEED_ADMIN_FULLNAME=${{ secrets.SEED_ADMIN_FULLNAME }}
            GoogleVision__ApiKey=${{ secrets.GOOGLE_VISION_API_KEY }}
            GroqSettings__ApiKey=${{ secrets.GROQ_API_KEY }}
            EMAIL_HOST=${{ secrets.EMAIL_HOST }}
            EMAIL_PORT=${{ secrets.EMAIL_PORT }}
            EMAIL_USER=${{ secrets.EMAIL_USER }}
            EMAIL_PASSWORD=${{ secrets.EMAIL_PASSWORD }}
            SENDER_EMAIL=${{ secrets.SENDER_EMAIL}}
            SENDER_NAME=${{ secrets.SENDER_NAME }}
            PayOS__ClientId=${{ secrets.PAYOS_CLIENT_ID }}
            PayOS__ApiKey=${{ secrets.PAYOS_API_KEY }}
            PayOS__ChecksumKey=${{ secrets.PAYOS_CHECKSUM_KEY }}
            PayOS__BaseUrl=${{ secrets.PAYOS_BASE_URL }}
            PayOS__ReturnUrl=${{ secrets.PAYOS_RETURN_URL }}
            PayOS__CancelUrl=${{ secrets.PAYOS_CANCEL_URL }}
            EOF

            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
